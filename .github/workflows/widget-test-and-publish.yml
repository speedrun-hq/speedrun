name: Test and Publish Widget

on:
  push:
    branches: [main]
    paths:
      - 'widget/**'
  pull_request:
    branches: [main]
    paths:
      - 'widget/**'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./widget

    strategy:
      matrix:
        node-version: [16.x, 18.x]

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './widget/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Test
        run: npm test
      
      - name: Build
        run: npm run build

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./widget

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: './widget/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Check version changes
        id: check_version
        run: |
          # Get the version from package.json
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          
          # Check if this version exists on npm
          VERSION_EXISTS=$(npm view @speedrun/widget@$PACKAGE_VERSION version || echo "")
          
          if [ -z "$VERSION_EXISTS" ]; then
            echo "Version $PACKAGE_VERSION does not exist on npm, proceeding with publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version $PACKAGE_VERSION already exists on npm, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Publish to npm
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} 